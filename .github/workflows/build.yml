name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Ghostscript (macOS universal)
        if: runner.os == 'macOS'
        run: |
          # ARM64 Ghostscript via native Homebrew
          brew install ghostscript
          ARM_GS=$(which gs)

          # x86_64 Ghostscript via Rosetta Homebrew
          arch -x86_64 /bin/bash -c \
            '[ -f /usr/local/bin/brew ] || NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"'
          arch -x86_64 /usr/local/bin/brew install ghostscript
          X86_GS=/usr/local/bin/gs

          mkdir -p src-tauri/binaries
          # Individual arch binaries (required by Tauri build script)
          cp "$ARM_GS" src-tauri/binaries/gs-aarch64-apple-darwin
          cp "$X86_GS" src-tauri/binaries/gs-x86_64-apple-darwin
          # Universal binary (required for bundling)
          lipo -create "$ARM_GS" "$X86_GS" -output src-tauri/binaries/gs-universal-apple-darwin
          chmod +x src-tauri/binaries/gs-aarch64-apple-darwin
          chmod +x src-tauri/binaries/gs-x86_64-apple-darwin
          chmod +x src-tauri/binaries/gs-universal-apple-darwin

      - name: Install Ghostscript (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Download directly from official releases — Chocolatey's NSIS installer
          # crashes with an access violation on some GitHub Actions runners.
          $url = "https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/gs10040/gs10040w64.exe"
          $installer = "$env:TEMP\gs-installer.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
          Start-Process -FilePath $installer -ArgumentList "/S" -Wait
          $gsExe = Get-ChildItem "C:\Program Files\gs" -Recurse -Filter "gswin64c.exe" |
                   Select-Object -First 1 -ExpandProperty FullName
          $gsDir = Split-Path $gsExe
          New-Item -ItemType Directory -Force -Path "src-tauri\binaries"
          Copy-Item $gsExe "src-tauri\binaries\gs-x86_64-pc-windows-msvc.exe"
          Copy-Item (Join-Path $gsDir "gsdll64.dll") "src-tauri\binaries\gsdll64.dll"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Crunch ${{ github.ref_name }}
          releaseBody: "Download the installer for your platform below."
          releaseDraft: false
          prerelease: false
          appName: Crunch
          appVersion: ${{ github.ref_name }}
          args: --target ${{ matrix.target }}
          includeUpdaterJson: false
